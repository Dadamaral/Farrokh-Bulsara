<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen - Álbum</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* O container principal continua com o Flexbox centralizando a imagem */
        .album-section {
            display: flex;
            justify-content: center;
            align-items: center;   
            height: 100vh;           
            width: 100%;
            background: linear-gradient(to bottom, #4B0082 50%, #E5E5E5 50%);
            
            /* ESSENCIAL: Permite que o título se posicione em relação a esta seção */
            position: relative; 
        }

        /* O TÍTULO AGORA FLUTUA */
        .album-title {
            position: absolute;
            
            /* Posiciona o texto na metade superior roxa */
            top: 15vh; /* Fica a 15% da altura da tela a partir do topo */
            
            /* Garante que o texto fique exatamente no centro horizontal */
            left: 50%;
            transform: translateX(-50%);
            
            color: white;
            font-size: 36px;
            font-family: sans-serif;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
        }

        /* O wrapper da imagem continua intocado no centro perfeito */
        .album-wrapper {
            position: relative;
            max-width: 300px; 
            width: 90%;       
            aspect-ratio: 1 / 1; 
        }

        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
            border-radius: 4px;
        }
    </style>
</head>
